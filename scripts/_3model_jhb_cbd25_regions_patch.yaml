# Six model_run entries to splice into configs/datasets/regions.yaml under
# regions.johannesburg.model_runs (alongside v3c_vexcel_2024,
# v3c_sam_maskbox_vexcel_2024_v4_agg, jhb_phaseA_vexcel_2024 etc).
#
# Apply with: scripts/_3model_jhb_cbd25_regions_patch_apply.py
# (or just paste manually — these are stable text blocks, indented 6 spaces
#  to land inside the model_runs: dict.)
#
# Produced 2026-05-14 for the 3-model JHB CBD 25-grid Tier-1 comparison.

      v3c_vexcel_2024_direct:
        model_version: "exp003_C_targeted_hn"
        imagery_layer: "vexcel_2024"
        results_path: "results/analysis/direct_maskrcnn_v1/johannesburg/v3c_vexcel_2024_direct"
        inference_date: "2026-05-14"
        grid_count: 25
        notes: |
          V3-C via detect_direct.py + finalize.py (merge-mode=pixel-or,
          v4_canonical postproc) on JHB CBD 25-grid Vexcel 2024. Paired
          with _sam_maskbox variant; baseline against train20_val5_hn
          and unified_reviewall_A in the 2026-05-14 Tier-1 comparison.
      v3c_vexcel_2024_direct_sam_maskbox:
