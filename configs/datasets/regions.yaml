        imagery_layer: "aerial_2025"
        results_path: "results/cape_town/unifiedA_li_clsonly_v2_bypass"
        inference_date: "2026-06-08"
        grid_count: 16
        notes: |
          A/B config (b) for the adaptive-bbox chip upgrade (chip_spec_version=
