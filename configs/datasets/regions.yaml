          G2027, G2028, G2029, G2030, G2031, G2032, G2033, G2034, G2035,
          G2037, G2038,
        ]
    default_imagery_layer: "aerial_2025"

    model_runs:
      v3c_targeted_hn_aerial_2025:
        model_version: "exp003_C_targeted_hn"
        imagery_layer: "aerial_2025"
        results_path: "results/cape_town/v3c_targeted_hn_aerial_2025"
        inference_date: "2026-03-29"
        grid_count: 45
        notes: "V3-C on CT aerial 2025 (incl. 8 grids rescued from results_joburg/ misplacement)"
