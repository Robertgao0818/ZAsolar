        imagery_layer: "aerial_2025"
        results_path: "results/cape_town/unifiedA_li_clsonly_v2_all"
        inference_date: "2026-06-08"
        grid_count: 16
        notes: |
          **LOCKED CT-census post-proc baseline (promoted 2026-06-08).** Supersedes
          unifiedA_li_clsonly (fixed-400). unifiedA_li_perdet -> solar_cls dinov2
          RETRAINED on adaptive bbox+margin chips (chip_spec_version=adaptive_v1:
          bbox-center, MARGIN=0.6, clamp [96,512]px, edge-reflect pad, INTER_CUBIC
          up / INTER_AREA down), aerial_2025 recalibrated thresh 0.7168, classify-all
          (area_cutoff bypass dropped; only ext_px>MAX_SIDE clipped dets kept as a
          PV floor, ~0.1% of CT dets). 3277 base -> 2144 kept. Metrics: cov50 0.829
          / sigma_Bw 0.260 / bulk 1.376 / RMSE 1332 / R2 0.955 / aggF1 0.742 --
          beats the fixed-400 baseline on EVERY metric and is threshold-robust
          (dominates cov50 at every sweep point 0.85-0.97). Tier-0 aerial_2025
          nonpv_kill@0.95R 0.959 (was 0.871). Domain bound: CT aerial_2025 in-domain
          only; JHB Vexcel/GEID keep the Gemini cross-domain reviewer (re-validate
          classify-all large band on JHB CBD 25-grid before extending cross-domain).
          Results: docs/plans/2026-06-08-cls-chip-adaptive-upgrade-RESULTS.md
