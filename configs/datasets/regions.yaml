        model_version: "exp_unified_reviewall_A"
        imagery_layer: "aerial_2025"
        results_path: "results/cape_town/unifiedA_li_perdet"
        inference_date: "2026-06-07"
        grid_count: 16
        notes: |
          CT census Path1/Path2 held-out eval, merge_mode per-detection,
          v4_canonical postproc. 16 held-out Li grids. Challenger; subject of the
          Path1 (t=0.85 + FP-cut) vs Path2 (GT-tuned polygon-conf) decision.
      unifiedA_li_gemfpcut:
        model_version: "exp_unified_reviewall_A"
        imagery_layer: "aerial_2025"
        results_path: "results/cape_town/unifiedA_li_gemfpcut"
        inference_date: "2026-06-07"
        grid_count: 16
        notes: |
          Path 1 = unifiedA_li_perdet + Gemini FP-review FP-cut (gemini-3-flash-agent,
          band-split: HI conf>=0.95 two-stage multiscale+skylight, LO 0.5-0.95 stage1-only
          as drops). All 3277 per-det polygons reviewed; 1176 dropped (35.9%), 2101 kept.
          Fail-closed apply (0 conflicts/integrity violations). Compared vs Path 2
          (GT-tuned polygon-conf t=0.97) on sigma_Bw/RMSE/bulk + cov50 count recall.
      unifiedA_li_clsonly:
        model_version: "exp_unified_reviewall_A"
        imagery_layer: "aerial_2025"
        results_path: "results/cape_town/unifiedA_li_clsonly"
        inference_date: "2026-06-08"
        grid_count: 16
        notes: |
          **SUPERSEDED 2026-06-08 by unifiedA_li_clsonly_v2_all (adaptive_v1).**
          Historical fixed-400-chip baseline, kept for provenance/A-B reference.
          unifiedA_li_perdet -> solar_cls PV filter (dinov2_vits14, fixed 400px
          centroid crop, aerial_2025 calibrated thresh 0.5396, production default
          area_cutoff=30: >=30 m2 auto-kept, <30 m2 adjudicated). NO Gemini, NO
          GT-threshold tuning. 3277 base -> 2211 kept (1066 dropped, 32.5%).
          Metrics: cov50 0.815 / sigma_Bw 0.297 / bulk 1.427 / aggF1 0.723. Was the
          locked baseline until the adaptive bbox+margin chip beat it on every metric
          (sigma_Bw 0.297->0.260, nonpv_kill@0.95R 0.871->0.959, cov50 0.815->0.829).
          calib thresh set out-of-sample (CT v1 val = Gao G16xx-G20xx), leakage gate
          vs these 16 L-grids = CLEAN. Domain bound: CT aerial_2025 in-domain only.
