# Dataset Registry — Regions & Grids
# 区域 → grids → 标注源 → 质量等级 → 基线指标
#
# imagery_layers[*].census_imagery_mid_date (optional, ISO YYYY-MM-DD):
#   The flight mid-date of the census imagery this layer represents. Used by
#   solar_backdating's install-date inference (`infer_install_dates.py`) as the
#   upper bound when status=done_installed_during_census. Layers without an
#   explicit field default to a mid-year fallback (`vintage`-MM-DD = 06-30) at
#   the consumer side. Filled in for layers actively used by V1.4 install-date
#   work; other layers can be added when needed.

regions:
  cape_town:
    description: "Cape Town rooftop solar installations"
    crs_metric: "EPSG:32734"
    crs_exchange: "EPSG:4326"
    paths:
      # PR3 (2026-04-19): tiles moved to tiles/cape_town/aerial_2025.
      # tiles_root now points to the region subtree; individual layers live
      # under imagery_layers[*].path.
      tiles_root: "/home/gaosh/zasolar_data/tiles/cape_town"
      results_root: "results"
      annotations_dir: "data/annotations/Capetown"
      task_grid: "data/task_grid.gpkg"
    # Region pattern accepts both the primary Gao scheme (G\d{4}) and Li's
    # independent L-prefix scheme (L\d{4}); per-scheme routing is in
    # annotation_schemes[*].grid_id_pattern.
    grid_id_pattern: "(G\\d{4}|L\\d{4})"

    annotation_schemes:
      gao:
        grid_id_pattern: "G\\d{4}"
        task_grid: "data/task_grid.gpkg"
        task_kml: "Dropbox/RA_Solar/grid_data/cape_town_grid_Gao.kml"
        grid_count: 2214
        grid_id_range: "G0001..G4401"
        annotations_dir: "data/annotations/Capetown"
        notes: "Primary scheme; source of all aerial_2025 imagery and training data."
      li:
        grid_id_pattern: "L\\d{4}"
        task_grid: "data/task_grid_li.gpkg"
        task_kml: "/mnt/c/Users/gaosh/Dropbox/RA_Solar/Li/capetown/cape_town_grid_Li_G0029_G1841.kml"
        grid_count: 17
        grid_id_range: "L1842..L1954"
        annotations_dir: "data/annotations/Capetown_Li"
        notes: |
          Li Yang's independent CT GT scheme (registered 2026-06-04, Phase 0.5 of
          ct-census-model-comparison-plan). 17 grids (L1842/43/44/46, L1895-1902,
          L1950-54), ~1,493 polygons. SOURCE IDS WERE GAO-NAMED (G1842..G1954) but
          remapped to L-prefix here because Li uses an INDEPENDENT grid namespace —
          Li's G1895 != Gao's G1895 (Gao task_grid has no G1895). L-prefix avoids
          all collision. Semantics: SAM2 sub-array level, A2 / T2,
          label_source=human_manual_sam_assisted; layers named SAM_太阳能_* /
          SAM_<id>_*. EPSG:4326. Annotated on aerial_2025 imagery (on-disk
          aerial_2025/G1895 tile bbox matches Li L1895 GT + KML cell exactly).
          Located in the eastern Cape Flats / False Bay (lon ~18.81-18.90), outside
          the Gao task_grid range — adds distinct urban-fabric geo-diversity to the
          ranking face. Leakage-clean (not in any Gao suite or v3c/unified_A
          training set). task_grid_li.gpkg carries the real KML cell geometry.
          NOTE: aerial_2025 tiles for L1895 are physically at
          tiles/cape_town/aerial_2025/G1895/ (downloaded under the source Gao ID);
          the other 16 Li grids still need WMS download (Phase 0.5 step 3).

    imagery_layers:
      aerial_2025:
        path: "/home/gaosh/zasolar_data/tiles/cape_town/aerial_2025"
        source: "aerial"
        vintage: "2025"
        census_imagery_mid_date: "2025-06-30"  # mid-year fallback
        file_layout: "chunked"
        file_pattern: "{grid_id}/{grid_id}_{col}_{row}_geo.tif"
        crs: "EPSG:4326"
        coverage_grids: [
          G1189, G1190, G1238, G1240, G1241, G1242, G1243, G1244, G1245,
          G1293, G1294, G1297, G1298, G1299, G1300, G1301, G1347, G1349,
          G1353, G1354, G1356, G1410, G1411, G1457, G1458, G1464, G1465,
          G1466, G1467, G1513, G1515, G1516, G1520, G1521, G1522, G1523,
          G1524, G1569, G1570, G1571, G1572, G1578, G1579, G1580, G1625,
          G1626, G1627, G1628, G1629, G1630, G1631, G1632, G1633, G1634,
          G1635, G1682, G1683, G1685, G1686, G1687, G1688, G1689, G1690,
          G1691, G1692, G1693, G1741, G1742, G1743, G1744, G1746, G1747,
          G1749, G1750, G1796, G1797, G1798, G1799, G1800, G1801, G1806,
          G1807, G1855, G1856, G1862, G1863, G1864, G1909, G1910, G1911,
          G1917, G1918, G1919, G1920, G1921, G1966, G1970, G1971, G1972,
          G1973, G1974, G1975, G1976, G1977, G1979, G1981, G2025, G2026,
          G2027, G2028, G2029, G2030, G2031, G2032, G2033, G2034, G2035,
          G2037, G2038,
          # Li L-prefix scheme grids (eastern Cape Flats; aerial_2025 vintage; added 2026-06-04).
          # Namespaced (L-prefix) so they never collide with Gao G-IDs. Tiles land under aerial_2025/L<NNNN>/.
          L1842, L1843, L1844, L1846, L1895, L1896, L1897, L1898, L1899,
          L1900, L1901, L1902, L1950, L1951, L1952, L1953, L1954,
        ]
    default_imagery_layer: "aerial_2025"

    model_runs:
      v3c_targeted_hn_aerial_2025:
