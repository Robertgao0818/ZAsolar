# Vexcel South Africa urban aerial coverage discovered from the API.
#
# Bboxes are lon_min,lat_min,lon_max,lat_max in EPSG:4326.
# Task grids are generated as clipped 1 km metric cells by
# scripts/validation/build_vexcel_task_grids.py.

coverage_version: "2026-04-26"
grid_size_m: 1000
crs_exchange: "EPSG:4326"
imagery_source: "vexcel"
product_family: "ortho"

regions:
  pietermaritzburg:
    city: "Pietermaritzburg"
    province: "KwaZulu-Natal"
    grid_prefix: "PMB"
    collection: "za-kzn-pietermaritzburg-2025"
    capture_start: "2025-12-16"
    capture_end: "2025-12-16"
    avg_gsd_m: 0.069
    coverage_area_km2: 266.3
    product: "final-ortho"
    bbox: [30.2893, -29.7104, 30.4532, -29.5190]
    coverage_path: "data/vexcel_coverage/pietermaritzburg_coverage.geojson"

