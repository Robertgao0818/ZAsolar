# Training Set Registry — Dataset Recipe Provenance
# 每个训练集条目记录构建参数和数据来源，供 model_registry 和 harness 追踪。
#
# 字段说明:
#   id:                       唯一标识符
#   description:              训练集描述
#   region_scope:             覆盖区域 (对应 regions.yaml 的 region key)
#   source_family:            标注来源族系 (哪些 label_source 参与)
#   annotation_source_policy: 标注源选取策略（文字描述）
#   tier_policy:              质量等级筛选策略
#   audit_policy:             审计策略（如热水器过滤）
#   easy_negative_ratio:      负样本比例
#   hn_policy:                hard negative 策略
#   output_dir:               COCO 数据集输出路径
#   notes:                    备注（含历史实验上下文）

training_sets:
  v3c_base:
    id: "v3c_base"
    description: "V3 base COCO — 43 grids, batch 001-003, Cape Town only"
    region_scope: [cape_town]
    source_family: [human_manual_sam_assisted]
    annotation_source_policy: "all cleaned SAM2 annotations in Capetown/"
    tier_policy: "all tiers (T1+T2)"
    audit_policy: null
    easy_negative_ratio: 0.15
    hn_policy: null
    output_dir: "/home/gaosh/zasolar_data/coco/coco_v3_no_hn"
    notes: >
      Base dataset for V3-C training; no hard negatives.
      Historical benchmark used cape_town_independent_26 (26 grids) as holdout.

  v3c_targeted_hn:
    id: "v3c_targeted_hn"
    description: "V3-C with batch 003 targeted HN"
    region_scope: [cape_town]
    source_family: [human_manual_sam_assisted]
    annotation_source_policy: "v3c_base + batch 003 FP hard negatives"
    tier_policy: "all tiers (T1+T2)"
    audit_policy: null
    easy_negative_ratio: 0.15
    hn_policy: "batch 003 reviewed FPs (export_targeted_hn.py)"
    output_dir: "/home/gaosh/zasolar_data/coco/coco_v3_targeted_hn"
    notes: "5623 images total; produced V3-C-HN checkpoint"

  v4_base:
    id: "v4_base"
    description: "V4 base COCO — 68 grids, batch 001-004"
    region_scope: [cape_town]
    source_family: [human_manual_sam_assisted]
    annotation_source_policy: "all cleaned SAM2 annotations in Capetown/"
    tier_policy: "all tiers (T1+T2)"
    audit_policy: null
    easy_negative_ratio: 0.15
    hn_policy: null
    output_dir: "/home/gaosh/zasolar_data/coco/coco_v4_base"
    notes: "Expanded with batch 004 (25 additional grids)"

  v4_1_hn:
    id: "v4_1_hn"
    description: "V4.1 combined HN — batch 003 + batch 004 hard negatives"
    region_scope: [cape_town]
    source_family: [human_manual_sam_assisted]
    annotation_source_policy: "v4_base + combined targeted HN"
    tier_policy: "all tiers (T1+T2)"
    audit_policy: null
    easy_negative_ratio: 0.15
    hn_policy: "batch 003 (ID 900000+) + batch 004 (ID 950000+)"
    output_dir: "/home/gaosh/zasolar_data/coco/coco_v4_1_hn"
    notes: "15.7% targeted HN ratio; produced V4.1-HN checkpoint"

  v4_2_jhb_ft:
    id: "v4_2_jhb_ft"
    description: "V4.2 — JHB-leaning fine-tune; 50 JHB + 25 CT panel-stratified anchor"
    region_scope: [cape_town, johannesburg]
    source_family: [reviewed_prediction, sam_refined_review, human_manual_sam_assisted]
    annotation_source_policy: >
      JHB CBD batch1 (25 grids, 2026-04-07, aerial_2023) +
      JHB Sandton batch2 (25 grids, 2026-04-21, aerial_2023) +
      CT v4_base subsample (25 grids, panel-count stratified, 3 strata, seed=42).
      Grid-ID collisions G0854/G0855 resolved to JHB (CT versions excluded
      from CT subsample pool).
    tier_policy: >
      All tiers (T1+T2). No manifest-based filtering — all annotations for
      the selected grids are included. JHB sources are R/S (T2 by default
      per ANNOTATION_SPEC); CT v4_base subsample is H (human_manual_sam_assisted,
      T2 by default until explicit A1 review).
    audit_policy: null
    easy_negative_ratio: 0.15
    hn_policy: null    # baseline before HN; HN deferred to v4_3 after seeing v4_2 FPs
    output_dir: "/home/gaosh/zasolar_data/coco/coco_v4_2_jhb_ft"
    init_weights: "checkpoints/exp004_v4_hn/best_model.pth"
    val_strategy: >
      Whole-grid val (no tile leakage): 5 CBD + 5 Sandton stratified by
      polygon count (seed=42, +1 for sandton). 65 grids in train (25 CT
      + 20 CBD + 20 Sandton), 10 grids in val.
    builder_script: "scripts/training/build_v4_2_jhb_ft.py"
    notes: >
      Recall-focused JHB-specialized fine-tune. Both CBD and Sandton GT
      polygons aligned to aerial_2023 pixels (verified via per-grid
      config.json). No vintage confound. CT 25 grids serve as anchor to
      prevent catastrophic forgetting on Cape Town. Pre-training V4
      baseline on 50 JHB grids: P=0.745 R=0.713 F1=0.728 (CBD P=0.684/R=0.825,
      Sandton P=0.810/R=0.664). Sandton recall bottleneck is proposal
      shortage (1152 FN with no proposal at any conf), not threshold filter.
      Targets: maintain CT F1 ≥ 0.80, grow JHB Sandton recall ≥ 0.80
      at iso-precision. Output checkpoint: exp006_v4_2_jhb_ft.

  v4_3_hn:
    id: "v4_3_hn"
    description: "V4.3 — V4.2 + hard negatives to repair CBD precision collapse"
    region_scope: [cape_town, johannesburg]
    source_family: [reviewed_prediction, sam_refined_review, human_manual_sam_assisted]
    annotation_source_policy: >
      Positive pool identical to v4_2_jhb_ft (25 CT panel-stratified +
      20 CBD + 20 Sandton train grids; val 5 CBD + 5 Sandton held out).
      HN pool: V4.2 FPs from val-10 inference + small-FP taxonomy on
      V4.2 train-grid predictions, with the assumption that the parallel
      post-proc PV / non-PV binary classifier gates thermal-looking FPs
      downstream — so HN no longer earmarks water heaters specifically.
    tier_policy: >
      Positives: same as v4_2_jhb_ft (all tiers, T1+T2).
      HN: unlabeled FP chips from V4.2 inference, no tier (negative class).
    audit_policy: >
      Exclude any HN chip that overlaps (IoU > 0.1) a reviewed-TP polygon
      in the source grid (prevents teaching model to suppress real PV).
    easy_negative_ratio: 0.15
    hn_policy: >
      Use FULL available supply of V4 FPs on train grids (val-10 grids
      excluded to prevent leakage). Derived pool:
        - JHB CBD train-20: 244 FPs (V4 preds w/ <0.1 overlap to reviewed TP)
        - JHB Sandton train-20: 444 FPs (same criterion)
        - CT residual: 455 chips from V4.1 HN shortlist (all size 5-20m²,
          includes thermal — post-proc PV/non-PV classifier will handle
          deployment-time filter; keeping CT thermal HN preserves CT
          precision training signal)
      Expected total HN ≈ 1143 chips, yielding ~13.6% HN ratio against
      7293 positives. Below the originally aspired 20%, but supply-limited;
      synthetic chip inflation rejected to keep HN signal authentic.
    hn_ratio_target: 0.14    # aspirational, constrained by FP supply
    hn_ratio_actual: 0.106   # after TP-overlap audit: 866 chips / 8159 total
    hn_actual_composition:
      cbd: 185          # from 244 FPs, 76% yield
      sandton: 229      # from 444 FPs, 52% yield (dense PV → many audit drops)
      ct_residual: 452  # from 455 shortlist, 99% yield
    output_dir: "/home/gaosh/zasolar_data/coco/coco_v4_3_hn"
    init_weights: "checkpoints/exp006_v4_2_jhb_ft/best_model.pth"
    val_strategy: >
      Same 10 val grids as v4_2_jhb_ft (5 CBD + 5 Sandton). Train-time
      monitoring MUST include inference-time F1 callback on val-10 at
      IoU≥0.5 + post_conf=0.85 (every 5 epochs); best_model selected by
      this F1, NOT by COCO AP50 (AP50 misled V4.2 — AP50=0.8371 but
      deployment F1=0.587).
    builder_script: "scripts/training/build_v4_3_hn.py"  # TODO
    notes: >
      V4.3 addresses V4.2's CBD precision collapse (0.562 → 0.284, -28pp)
      and Sandton precision regression (0.778 → 0.579, -20pp) while
      preserving V4.2's Sandton recall gain (+7pp).

      Original 20% aspiration reduced to 14% (supply-limited): JHB
      train-40 produced 688 V4 FPs + 455 CT residual = 1143 max HN
      chips, giving 13.6% ratio against 7293 positives. Cannot reach
      20% without synthetic chip inflation (duplicated crops of same FP)
      which we reject — risks overfitting to FP pixel patterns instead
      of teaching context-level rejection.

      Rationale for this ratio vs V4.1's 15.7%:
        - 13.6% ≈ V4.1 (within noise) but HN now JHB-heavy (60% vs 0%),
          which is where the precision deficit lives
        - V4.2 demonstrated HN=0% → FP explosion (+2.3×); any non-zero
          HN with JHB representation should help
        - Post-proc PV/non-PV classifier absorbs thermal-FP risk, so
          we don't need to allocate HN budget specifically to thermal
          suppression — current composition is fine

      Guardrail variant: 10% HN (subsample to ~810 chips) to sanity-check
      that 13.6% isn't oversaturating. Train both variants serially;
      ~6 GPU-hours overhead. Select by val-10 F1.

  clean_baseline_hs:
    id: "clean_baseline_hs"
    description: >
      Clean H/S-only baseline — no reviewed-prediction supervision in the
      training corpus. First training set assembled under the
      2026-05-09 supervision-layering plan to break the V3-C halo cycle.
    region_scope: [cape_town, johannesburg]
    source_family: [human_manual_qgis_geosam, sam_added_browser]
    annotation_source_policy: >
      CT 260320 (3 grids G1189/G1190/G1238, 475 polygons, QGIS+GeoSAM
      manual labels predating the review GUI; user-confirmed reliable) +
      JHB raw sam_added pre-dissolve (25 grids G0772..G0926, 1699
      polygons, RA-drawn FN supplements via sam_fn_review.py browser
      tool, sourced from
      results/johannesburg/v3c_vexcel_2024_ch1_sample/<grid>/review/<grid>_sam_added.gpkg).
      Reviewed predictions (R-type) explicitly EXCLUDED — this is the
      cleanest H/S-only corpus available given that the browser real-time
      SAM point-prompt feature only landed 2026-04-13 (post-CT 260403).
    tier_policy: >
      All polygons treated as A1-equivalent supervision. Per the 2-axis
      model the JHB sam_added polygons are A1/H by provenance (RA-drawn,
      installation-spec aware), CT 260320 is A1/H (QGIS+GeoSAM manual).
    audit_policy: null
    easy_negative_ratio: TBD
    hn_policy: >
      Optional merge from coco_v4_3_hn HN chips (tile-anchored, no
      polygon supervision; safe to mix with clean positives).
    output_dir: "/home/gaosh/zasolar_data/coco/coco_clean_hs_ct260320_jhb_sam_added_20260510"
    init_weights:
      pilot_A: "checkpoints/exp003_C_targeted_hn/best_model.pth"
      pilot_G: "/home/gaosh/.cache/huggingface/hub/models--giswqs--geoai/snapshots/089548329c81f128fa12576663e7abdedb5cfa0e/solar_panel_detection.pth"
    val_strategy: >
      5 JHB grids held out from training (specific grids per build script
      --val-grids). Channel 3 area_F1 evaluation surface shrinks from 25
      to 5 grids; accepted tradeoff for clean holdout.
    builder_script: "scripts/training/build_clean_baseline.py"
    notes: >
      Pilot design: A vs G head-to-head on the same data package.
        Pilot A: --pretrained <V3-C> --reinit-mask-head
                 (preserve V3-C backbone/RPN/box prior, wipe halo'd mask
                  predictor; tests whether non-mask V3-C prior is worth
                  keeping)
        Pilot G: --pretrained <geoai stock>
                 (clean solar prior end-to-end, no halo legacy; tests
                  whether geoai's smaller-but-clean pretrain suffices)
      5 epochs each on RTX 5090, same LR / augmentation / eval cadence.
      Decision criterion: 5-grid val area_F1 + chip F1@85 + bulk_ratio.
      If close (<2pp) prefer G for cleaner experimental semantics.

      Known control variable: CT aerial_2025 ground-anisotropic pixels
      (~7.14 × 9.06 cm at 33°S, EPSG:4326 native) vs JHB Vexcel
      isotropic 6.7 cm. NOT corrected this round — same domain mix
      v3c/v4_2/v4_3 trained on, so it does not confound the clean-vs-
      contaminated supervision comparison. Backlog item if pilot
      under-performs.

      Lit support for this design (2026-05-10 research dive):
        - Zhao et al. "Reset It and Forget It" (zapping last layer
          gives +9.4pp Omniglot, large gains Mini-ImageNet) — supports
          Pilot A's targeted reinit
        - Benchmarking Label Noise in Instance Segmentation 2024 —
          spatial mask noise drops mAP >10pp, classification-noise
          remedies do not transfer; supports concentrating intervention
          on mask supervision
        - Gerstgrasser 2024 COLM "model collapse" — accumulation
          principle says drift bias lives in weights; only escape is
          mixing real data with clean state. Both A and G satisfy
          this in different ways.
        - He 2019 ICCV "Rethinking ImageNet Pre-training" — from-
          scratch matches pretrained given enough iterations; cited
          loosely (small-data caveat applies here, hence not pursuing
          full reinit / torchvision COCO start).

  unified_reviewall_20260511:
    id: "unified_reviewall_20260511"
    description: >
      Unified review-resources COCO — CT aerial_2025 Batch003/004/002b/EarlySAM2
      (excluding cape_town_independent_26 26-grid benchmark holdout) +
      JHB Vexcel 2024 25-grid CBD (20 train + 5 val). First training set with
      per-instance mask_trusted gating to break the V3-C halo cycle on the
      mask head while preserving box + cls supervision from all sources.
    region_scope: [cape_town, johannesburg]
    source_family:
      - human_manual_sam_assisted    # CT batch001/002/002b/EarlySAM2 grids
      - reviewed_prediction          # CT Batch003/004 + JHB V3C-reviewed accepted
      - sam_added_true_fn            # CT Batch003/004 non-interactive FN catches
      - sam_added_browser            # JHB Vexcel interactive browser SAM FN draws
    annotation_source_policy: >
      CT side: discover_annotations(regions=[cape_town]) − cape_town_independent_26
      (G1240, G1243-G1245, G1293-G1300, G1349, G1354, G1410, G1411, G1466,
      G1467, G1516, G1520-G1524, G1569-G1572).  Legacy weak-supervision grids
      (schema_type=legacy_ct) skipped.  Per-row label_source mapped from the
      GeoPackage `source` column: NaN→reviewed_prediction, sam_fn_marker→
      sam_added_true_fn, sam2→human_manual_sam_assisted, batch001/002/002b
      (no source column) → human_manual_sam_assisted.

      JHB side: per-grid combine of
      results/johannesburg/v3c_vexcel_2024_ch1_sample/<grid>/review/
        - <grid>_reviewed.gpkg filtered to review_status=="correct"
            → label_source=reviewed_prediction (untrusted, V3-C halo source)
        - <grid>_sam_added.gpkg all rows
            → label_source=sam_added_browser (trusted, interactive browser
              SAM point-prompt, post-2026-04-13).
      25 grids G0772..G0926; 20 in train, 5 held out for val (whole-grid val,
      no tile leakage).
    tier_policy: >
      All tiers (T1+T2). Tier filtering is orthogonal — the trusted/untrusted
      split for mask supervision is driven by label_source, not quality_tier.
    audit_policy: null
    easy_negative_ratio: 0.15
    hn_policy: >
      HN chips are NOT bundled by build_unified_reviewall.py in this round.
      Existing v4_3_hn pool (866 chips: CT 452 + CBD 185 + Sandton 229) is
      the candidate carry-over; new V3C-delete chips from CT Batch003/004
      (~1,916) and JHB Vexcel 25 (503) can be added later via separate
      export_targeted_hn.py invocations or a merge step.
    output_dir: "/workspace/coco/unified_reviewall_20260511"
    val_strategy: >
      JHB val = 5 whole grids: G0772 (moderate density), G0816 (mixed CBD +
      micro-review reference), G0817 (dense PV roof failure-mode anchor),
      G0888 (sparse residential), G0925 (multi-array installation outlier).
      Coverage spans the 5 known failure modes (dense / mid / sparse /
      micro / outlier) so val area_F1 + Ch2 recall reflect breadth.
      CT side has no whole-grid val held out from training — val signal on
      CT comes from the 26-grid cape_town_independent_26 benchmark suite
      run separately after training (it's A path's degradation detector
      per the plan; G path's CT performance is reference-only).
    init_weights:
      A_path: "checkpoints/exp003_C_targeted_hn/best_model.pth"   # V3-C warm
      G_path: "~/zasolar_data/models/giswqs_solar_panel_detection.pth"  # opengeoai fresh
    epoch_budget:
      A_path: { stage1: 3, stage2: 12, total_max: 15 }
      G_path: { stage1: 5, stage2: 20, total_max: 25 }
    builder_script: "scripts/training/build_unified_reviewall.py"
    untrusted_trusted_ratio:
      bound: "untrusted <= 4 × trusted (Gerstgrasser 2024 COLM accumulation principle)"
      ct_trusted_estimate: 1834
      ct_untrusted_estimate: 4317
      jhb_trusted_train_estimate: 1407
      jhb_untrusted_train_estimate: 1764
      combined_train_estimate: { trusted: 3495, untrusted: 5580, ratio: 1.60 }
    notes: >
      Plan source: docs/plans/review-aerial-2023-jhb-opengeoai-v3c-parallel-biscuit.md
      (approved 2026-05-11).

      Key levers ON this round:
        - per-instance mask_trusted gating (train.py --per-instance-mask-trusted)
        - per-source boundary band weighting (train.py --per-source-mask-weight,
          inner layer that still applies to trusted instances)
        - Stage 1 freeze-mask-head warm-up (--freeze-mask-head)
        - Differential LR (backbone ×0.1, RPN/box ×1.0, mask ×1.0)
        - Untrusted ≤ 4 × Trusted assertion in builder
        - Per-source box reg loss logging + 25% gap threshold signal (next-round
          box_trusted decision)
        - Uneven eval schedule + best-so-far + patience=3 OR-stop on
          area_f1/ch2_recall (proxy: chip-level f1_85/ap50 in-loop; grid-level
          area_F1 + bulk_ratio gate is a post-hoc selector)

      Levers DEFERRED to next round (per 2026-05-09 supervision-layering plan
      工程纪律 — one lever per training round):
        - 25-40% H batch composition sampler
        - Area-adaptive boundary ignore band
        - Selective relabelling pipeline

      Pass criteria (JHB Vexcel val-5):
        Ch3 area_F1 ≥ 0.78, Ch2 recall@IoU≥0.5 ≥ 0.55,
        bulk_ratio ∈ [0.85, 1.15], polygon@IoU≥0.5 F1 within 2pp of 0.80.

      A vs G decision (JHB Vexcel val-5 only):
        gap < 2pp → choose G (cleaner experimental semantics, no V3-C halo legacy).
        A leads ≥2pp → keep A (V3-C prior is worth preserving).
        G leads ≥2pp → next round starts from G.

  unified_reviewall_v2:
    id: "unified_reviewall_v2"
    description: >
      Declarative-spec rebuild of unified_reviewall, normalized for the
      training-pool effort (Phase 4, 2026-05-29). Same dataset as
      unified_reviewall_20260511 but built via the v2 dataset spec
      (configs/pipelines/datasets/unified_reviewall_v2.yaml + pipeline.
      dataset_builder), and with ALL aerial_2023 positives archived
      (exclude_imagery_layers: [aerial_2023]). Auto-backfilled from the v2
      build_manifest.json. BYTE-EQUIVALENT to the bespoke builder on
      selected_annotations (9,738 rows, 0 diff).
    region_scope: [cape_town, johannesburg]
    source_family:
      - human_manual_sam_assisted    # CT trusted slice
      - reviewed_prediction          # CT + JHB V3C-reviewed accepted (untrusted)
      - sam_added_true_fn            # CT batch FN catches (untrusted)
      - sam_added_browser            # JHB interactive browser SAM (trusted)
    annotation_source_policy: >
      Identical selection to unified_reviewall_20260511 (CT discover −
      cape_town_independent_26 − legacy_ct; JHB Vexcel review reviewed+sam_added
      over 25 grids), expressed declaratively via spec.positives (two
      pool_manifest CT sources + two results_review_dir JHB sources) with
      exclude_imagery_layers=[aerial_2023]. Verified byte-equivalent.
    tier_policy: "All tiers (T1+T2)."
    audit_policy: null
    easy_negative_ratio: 0.15
    hn_policy: >
      negative_pool HN declared in the spec (archetypes:
      solar_thermal_water_heater / skylight_roof_window /
      hvac_rooftop_equipment, min_confidence A2, max_ratio 0.04). Yields 0
      chips today (pool manifest has no bbox geometry yet); mechanism in place
      for when geometry is backfilled.
    output_dir: "${SOLAR_ARTIFACT_ROOT:-/home/gaosh/zasolar_data}/coco/coco_unified_reviewall_v2_<date>"
    val_strategy: >
      Whole-grid JHB holdout (val_grids: G0772, G0816, G0817, G0888, G0925).
      CT all-train. Same as unified_reviewall_20260511.
    init_weights: v3c   # model_registry id → checkpoints/exp003_C_targeted_hn/best_model.pth
    builder_script: "pipeline.dataset_builder (spec: configs/pipelines/datasets/unified_reviewall_v2.yaml)"
    spec_schema_version: 2
    selected_annotations: 9738    # auto-backfilled from build_manifest.json
    untrusted_trusted_ratio:
      bound: "untrusted <= 4 × trusted (mask_supervision.untrusted_max_x_trusted)"
      combined_train: { trusted: 3383, untrusted: 5691, ratio: 1.68 }
    notes: >
      Supersedes unified_reviewall_20260511's bespoke builder
      (scripts/training/build_unified_reviewall.py, header-deprecated). Per
      polygon: CT aerial_2025 5,903 + JHB vexcel_2024 3,835 = 9,738; 0
      aerial_2023. mask_supervision: per_instance_mask_trusted=true,
      untrusted_max_x_trusted=4.0, freeze_mask_head=false.
        A retreats on cape_town_independent_26 (< 0.78) → A fail, G default.
