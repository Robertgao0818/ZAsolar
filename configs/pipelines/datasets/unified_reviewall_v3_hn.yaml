# unified_reviewall — v3_hn declarative spec (schema_version 2)
# ─────────────────────────────────────────────────────────────────────────────
# F1-gap plan C-1 (docs/plans/2026-06-10-rcnn-f1-gap-review.md): "负样本池真正
# 落地" — raise the easy-negative ratio off the project-low 0.15:1 and turn the
# project-level hard-negative pool ON so it actually emits chips.
#
# Derived from unified_reviewall_v2.yaml (the locked provenance spec, NOT
# modified). The ONLY deltas vs v2:
#   1. name → unified_reviewall_v3_hn
#   2. negatives.easy_neg_ratio  0.15 → 0.5  (PV-literature chip-level 0.5–0.75)
#   3. hard_negatives turned ON to emit chips (v2 carried the block for
#      byte-diff parity but it yielded 0 chips with no geometry).
# Positive sources, exclude_grids, val_grids, split, chip, mask_supervision and
# init_weights are byte-identical to v2 so the ONLY training delta is the
# negative budget (single-lever attribution, F1-gap global rule).
#
# HN stream reality (2026-06-11): every row in data/negative_pool/manifest.csv
# is currently training_eligible=false (geid_2024_02 bootstrap + cross-domain
# Vexcel empty-probe rows), gated out by the imagery-layer balance rule. So this
# spec emits the FULL easy-neg bump today and 0 targeted-HN chips until CT-aerial
# / Vexcel HN flux is comparable and those rows are flipped eligible. The
# negative_pool mechanism is wired end-to-end (geometry backfilled, extractor
# crops, training_eligible gate enforced). The cropper reprojects the stored
# EPSG:4326 bbox into each tile's native CRS (2026-06-12 fix), so CT aerial
# (4326) AND Vexcel/aerial_legacy (EPSG:3857) layers both crop correctly; it
# will start contributing chips the moment in-domain eligible rows exist.

schema_version: 2
name: unified_reviewall_v3_hn
build_family: detector_train
regions: [cape_town, johannesburg]
evaluation_regime: installation

# ── Drop ALL aerial_2023 positives (CBD + Sandton). Enforced by the builder:
#    any positive record whose imagery_layer is in this list is skipped. ──
exclude_imagery_layers:
  - aerial_2023

selection:
  tier_filter: T1+T2
  exclude_grids:
    - G1240
    - G1243
    - G1244
    - G1245
    - G1293
    - G1294
    - G1297
    - G1298
    - G1299
    - G1300
    - G1349
    - G1354
    - G1410
    - G1411
    - G1466
    - G1467
    - G1516
    - G1520
    - G1521
    - G1522
    - G1523
    - G1524
    - G1569
    - G1570
    - G1571
    - G1572

# ── Positive sources (byte-identical to v2) ─────────────────────────────────
positives:
  - bucket: trusted
    source_kind: pool_manifest
    pool_manifest: data/training_pool/positive_trusted_manifest.csv
    regions: [cape_town]
    imagery_layers: [aerial_2025]
    tier_filter: T1+T2
    label_sources: [human_manual_sam_assisted]
  - bucket: untrusted
    source_kind: pool_manifest
    pool_manifest: data/training_pool/positive_untrusted_manifest.csv
    regions: [cape_town]
    imagery_layers: [aerial_2025]
    tier_filter: T1+T2
    label_sources: [reviewed_prediction, sam_added_true_fn]

  - bucket: trusted
    source_kind: results_review_dir
    review_root: results/johannesburg/v3c_vexcel_2024_ch1_sample
    regions: [johannesburg]
    imagery_layers: [vexcel_2024]
    label_sources: [sam_added_browser]
    grids:
      - G0772
      - G0773
      - G0774
      - G0775
      - G0776
      - G0814
      - G0815
      - G0816
      - G0817
      - G0818
      - G0853
      - G0854
      - G0855
      - G0856
      - G0857
      - G0888
      - G0889
      - G0890
      - G0891
      - G0892
      - G0922
      - G0923
      - G0924
      - G0925
      - G0926
  - bucket: untrusted
    source_kind: results_review_dir
    review_root: results/johannesburg/v3c_vexcel_2024_ch1_sample
    regions: [johannesburg]
    imagery_layers: [vexcel_2024]
    label_sources: [reviewed_prediction]
    grids:
      - G0772
      - G0773
      - G0774
      - G0775
      - G0776
      - G0814
      - G0815
      - G0816
      - G0817
      - G0818
      - G0853
      - G0854
      - G0855
      - G0856
      - G0857
      - G0888
      - G0889
      - G0890
      - G0891
      - G0892
      - G0922
      - G0923
      - G0924
      - G0925
      - G0926

# ── Whole-grid JHB holdout (5 grids; byte-identical to v2). ──────────────────
val_grids:
  - G0772
  - G0816
  - G0817
  - G0888
  - G0925

split:
  strategy: whole_grid_jhb_holdout
  seed: 42

# easy negatives: empty chips (intentional hard negatives) raised to 0.5:1
# (F1-gap C-1). v2 was 0.15:1 = project-self-reviewed "near PV-literature
# minimum"; the chip-level literature recommendation is 0.5–0.75.
negatives:
  easy_neg_ratio: 0.5

chip:
  size: 400
  overlap: 0.25

mask_supervision:
  per_instance_mask_trusted: true
  boundary_band_iters: 0
  untrusted_max_x_trusted: 4.0
  freeze_mask_head: false

# ── Hard negatives: project-level archetype pool (ON) ────────────────────────
# Filters data/negative_pool/manifest.csv by archetype + confidence floor, then
# the extractor additionally honours training_eligible (provenance-only rows are
# skipped — imagery-layer balance gate). Broadened archetype set vs the v2 stub
# so the full lookalike taxonomy is admitted once eligible rows exist.
# max_ratio caps the HN share of the train pool.
hard_negatives:
  - type: negative_pool
    archetypes:
      - solar_thermal_water_heater
      - skylight_roof_window
      - hvac_rooftop_equipment
      - corrugated_metal_roof
      - rusty_corrugated_iron
      - ground_road_marking
      - pergola_carport_shadow
      - roof_shadow_dark_fixture
    min_confidence: A2
    max_ratio: 0.10

# ── Warm-start weights (byte-identical to v2). ──────────────────────────────
init_weights: v3c

output:
  root: ${SOLAR_ARTIFACT_ROOT:-/home/gaosh/zasolar_data}
  name_template: "coco_{name}_{date}"
