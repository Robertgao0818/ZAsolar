# Model Registry — 模型权重注册表
# 新训练完成后在此添加一条即可参与 benchmark 对比。
#
# 字段说明:
#   tag:                        短标签，用于 CLI 和报告显示
#   status:                     生命周期 (可选, active|archived|deprecated|superseded; 缺省=active)
#   checkpoint:                 相对于 repo root 的权重路径
#   description:                训练配置简述
#   coco_ap50:                  训练时的验证集 COCO AP@IoU=0.5 (可选)
#   training_set_id:            对应 training_sets.yaml 的 ID (可选)
#   region_scope:               训练覆盖区域 (可选)
#   evaluation_profile_default: 默认评估 profile (可选, installation | legacy_instance)
#   postproc_config:            默认后处理配置路径 (可选)

models:
  v1:
    tag: "V1-FT"
    checkpoint: "checkpoints/v1_ft_cs400_tileval_20260317_r4/best_model.pth"
    description: "V1 fine-tune (257 weak-supervision annots, 3 grids)"
    coco_ap50: 0.4205
    region_scope: [cape_town]
    evaluation_profile_default: "installation"

  v2:
    tag: "V2-SAM2"
    checkpoint: "checkpoints/v2_sam2_260320/best_model.pth"
    description: "V2 SAM2 retrain (456 T1 annots, 3 grids)"
    coco_ap50: 0.6889
    region_scope: [cape_town]
    evaluation_profile_default: "installation"

  v3c:
    tag: "V3-C-HN"
    checkpoint: "checkpoints/exp003_C_targeted_hn/best_model.pth"
    description: "V3 targeted hard negatives (5623 images, batch 003 FPs)"
    coco_ap50: 0.7689
    training_set_id: "v3c_targeted_hn"
    region_scope: [cape_town]
    evaluation_profile_default: "installation"
    postproc_config: "configs/postproc/v4_canonical.json"

  v3_cleaned:
    tag: "V3-Clean"
    checkpoint: "checkpoints_cleaned/best_model.pth"
    description: "V3 cleaned data (43 grids, epoch 4/20, paused)"
    coco_ap50: 0.788
    region_scope: [cape_town]
    evaluation_profile_default: "installation"

  v4_1:
    tag: "V4.1-HN"
    checkpoint: "checkpoints/exp005_v4_1_hn/best_model.pth"
    description: "V4.1 combined HN (68 grids, 15.7% targeted HN, batch003+004)"
    coco_ap50: 0.7592
    training_set_id: "v4_1_hn"
    region_scope: [cape_town]
    evaluation_profile_default: "installation"
    postproc_config: "configs/postproc/v4_canonical.json"

  v4_2:
    tag: "V4.2-JHB-FT"
    status: archived    # 2026-05-29: trained on aerial_2023 (vintage/GSD mismatch vs vexcel_2024 base). Kept for reproducibility / benchmark history, not for production reuse.
    checkpoint: "checkpoints/exp006_v4_2_jhb_ft/best_model.pth"
    description: "V4.2 JHB-leaning fine-tune (25 CT anchor + 25 JHB CBD aerial_2023 + 25 JHB Sandton aerial_2023; init from V4)"
    coco_ap50: 0.8371
    training_set_id: "v4_2_jhb_ft"
    region_scope: [cape_town, johannesburg]
    evaluation_profile_default: "installation"
    postproc_config: "configs/postproc/v4_canonical.json"

  exp_unified_reviewall_A:
    tag: "UnifiedRA-A"
    checkpoint: "checkpoints/exp_unified_reviewall_A/best_model.pth"
    description: "V3-C warm-start unified reviewall (2026-05-13, mask-trusted halo fix); CT aerial_2025 + JHB Vexcel 2024, per-instance mask_trusted gating"
    training_set_id: "unified_reviewall_20260511"
    region_scope: [cape_town, johannesburg]
    evaluation_profile_default: "installation"
    postproc_config: "configs/postproc/v4_canonical.json"
